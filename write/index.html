<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>LocalHub 글 작성</title>
  
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>

<div id="app" v-cloak :data-theme="theme">

<header class="topbar">
  <button class="brand" type="button" onclick="location.href='/'">
    <span class="brand-mark">L</span>
    <span>LocalHub</span>
  </button>
  <div class="global-search">
    <input v-model.trim="searchKeyword" placeholder="맛집, 관광지, 축제, 게시글 검색" @keyup.enter="submitGlobalSearch" />
    <button type="button" @click="submitGlobalSearch">검색</button>
  </div>
  <nav class="top-actions">
    <button
      class="theme-toggle"
      type="button"
      role="switch"
      :aria-checked="theme === 'dark'"
      :aria-label="theme === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환'"
      @click="toggleTheme"
    >
      <span class="theme-sun" aria-hidden="true">☀️</span>
      <span class="theme-moon" aria-hidden="true">🌙</span>
      <span class="theme-thumb" aria-hidden="true">
        {{ theme === 'dark' ? '🌙' : '☀️' }}
      </span>
    </button>
  </nav>
</header>

<transition name="toast">
  <aside v-if="toast.visible" class="toast-popup" :class="`toast-${toast.type}`" role="alert">
    <span class="toast-icon">{{ toast.type === 'success' ? '✓' : '!' }}</span>
    <div>
      <strong>{{ toast.type === 'success' ? '완료' : '오류가 발생했습니다' }}</strong>
      <p>{{ toast.message }}</p>
    </div>
    <button type="button" @click="hideToast">×</button>
    <span class="toast-progress"></span>
  </aside>
</transition>

<main>
  <section class="page panel write-page">
    <button class="back-button page-back" type="button" @click="goBack"><span>←</span> {{ editing ? '게시글로 돌아가기' : '목록으로' }}</button>
    <div class="page-title write-heading"><div><p>WRITE POST</p><h1>{{ editing ? '게시글 수정' : '새 게시글 작성' }}</h1><span>지역 주민에게 도움이 되는 정보를 작성해 주세요.</span></div></div>
    <form @submit.prevent="submitPost">
      <label><span>제목</span><input v-model.trim="form.title" required /></label>
      <label><span>내용</span><textarea v-model.trim="form.content" rows="10" required></textarea></label>
      <label><span>장소 태그</span>
        <select v-model="form.placeId" required>
          <option value="">장소를 선택하세요</option>
          <option v-for="place in places" :key="place.id" :value="place.id">{{ place.name }} — {{ place.category }}</option>
        </select>
      </label>
      <div class="form-grid">
        <label><span>작성자</span><input v-model.trim="form.author" required /></label>
        <label><span>비밀번호</span><input v-model="form.password" type="password" required /></label>
      </div>
      <div class="form-actions"><button type="button" @click="goBack">취소</button><button class="primary" :disabled="loading">{{ loading ? '처리 중' : (editing ? '수정 완료' : '등록') }}</button></div>
    </form>
  </section>
</main>

<footer>
  이 서비스는 한국관광공사 Tour API(TourAPI 4.0)의 데이터를 활용하였습니다.
  출처: 한국관광공사 · 라이선스: 공공누리 제3유형
</footer>

</div>

<script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>
<script src="/assets/config.js"></script>
<script src="/assets/shared.js"></script>

<script src="/assets/write.js"></script>
</body></html>
